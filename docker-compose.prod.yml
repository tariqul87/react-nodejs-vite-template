services:
  backend:
    env_file:
      - ./backend/.env.prod
    environment:
      NODE_ENV: production
  frontend:
    build:
      args:
        VITE_API_URL: ${VITE_API_URL:-}
  postgres:
    env_file:
      - ./backend/.env.prod
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    ports: []

volumes:
  postgres_prod_data:
